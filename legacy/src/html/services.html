<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>Servicios</title>
        <!-- Estilos de bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
        <!-- Iconos de bootstrap -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <!-- Estilo propio -->
        <link rel="stylesheet" href="../css/tables.css" />
    </head>

    <body>
        <div class="header">
            <p>Lista de servicios</p>
            <div class="d-flex gap-3">
                <button class="btn delete d-none" id="delete" title="Eliminar"><i class="bi bi-trash3"></i> Eliminar</button>
                <button class="btn filter" id="filter" data-bs-toggle="dropdown" title="Filtros de la tabla"><i class="bi bi-filter"></i> Filtros</button>
                <ul class="dropdown-menu">
                    <li>
                        <button class="dropdown-item" data-filter="codigo"><i class="bi bi-filter-left"></i> Codigo</button>
                    </li>
                    <li>
                        <button class="dropdown-item" data-filter="nombre"><i class="bi bi-filter-left"></i> Nombre</button>
                    </li>
                    <li>
                        <button class="dropdown-item" data-filter="unidad_medida"><i class="bi bi-filter-left"></i> Unidad</button>
                    </li>
                    <li>
                        <button class="dropdown-item" data-filter="precio"><i class="bi bi-filter-left"></i> Precio</button>
                    </li>
                    <li>
                        <button class="dropdown-item" data-filter="createdAt"><i class="bi bi-filter-left"></i> Fecha</button>
                    </li>
                </ul>

                <button class="btn filter" id="order" title="Ordenar tabla"><i class="bi bi-arrow-down-up"></i> Orden</button>
                <button class="btn new" id="newServiceBtn" title="Nuevo registro" data-bs-toggle="offcanvas" href="#offcanvasNewService" role="button" aria-controls="offcanvasNewService"><i class="bi bi-plus-lg"></i> Nuevo servicio</button>
            </div>
        </div>

        <div class="table-container position-relative" id="tableContainer">
            <div class="table-expand">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th scope="col" class="text-center"><i class="bi bi-check-square-fill"></i></th>
                            <th scope="col">Imagen</th>
                            <th scope="col">Codigo</th>
                            <th scope="col">Nombre</th>
                            <th scope="col">Descripcion</th>
                            <th scope="col">Unidad</th>
                            <th scope="col">Precio</th>
                            <th scope="col">Registrado</th>
                            <th scope="col" class="text-center"><i class="bi bi-caret-down-fill"></i></th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div class="table-footer">
                <p><span id="rowSelectNum">0</span> de <span id="rowsNum">0</span> filas seleccionadas</p>
                <div class="d-flex gap-3 align-items-center">
                    <p>Pagina <span id="currentPageNum">1</span> de <span id="totalPagesNum">1</span></p>
                    <button class="btn filter" id="start" disabled><i class="bi bi-chevron-double-left"></i></button>
                    <button class="btn filter" id="prev" disabled><i class="bi bi-chevron-left"></i></button>
                    <button class="btn filter" id="next" disabled><i class="bi bi-chevron-right"></i></button>
                    <button class="btn filter" id="end" disabled><i class="bi bi-chevron-double-right"></i></button>
                </div>
            </div>
        </div>

        <div class="offcanvas form-basic offcanvas-end" data-bs-backdrop="static" tabindex="-1" id="offcanvasNewService" aria-labelledby="offcanvasNewServiceLabel">
            <div class="offcanvas-header d-flex justify-content-between">
                <button type="button" class="btn close" id="close" data-bs-dismiss="offcanvas" aria-label="close"><i class="bi bi-x-lg"></i></button>
                <p class="offcanvas-title" id="offcanvasNewServiceLabel">Servicios</p>
                <button type="button" class="btn edit" id="edit" title="Editar servicio" disabled><i class="bi bi-pencil-square"></i></button>
            </div>
            <div class="offcanvas-body">
                <p class="text-center">En esta seccion vamos a crear y actualizar servicios, a continuacion llena la informacion solicitada*.</p>
                <form id="formNewService">
                    <div class="row">
                        <div class="col">
                            <label for="code" class="form-label">Codigo*</label>
                            <div class="input-group flex-nowrap">
                                <input type="text" class="form-control focus-ring" id="code" placeholder="Codigo del servicio" required />
                            </div>
                        </div>
                        <div class="col">
                            <label for="name" class="form-label">Nombre*</label>
                            <div class="input-group flex-nowrap">
                                <input type="text" class="form-control focus-ring" id="name" placeholder="Nombre del servicio" required />
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <label for="description" class="form-label">Descripcion</label>
                            <textarea class="form-control focus-ring" id="description" rows="2" placeholder="Escribe aqui la descripcion del servicio"></textarea>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <label for="unitMeasure" class="form-label">Unidad de medida*</label>
                            <div class="input-group flex-nowrap">
                                <input type="text" class="form-control focus-ring" id="unitMeasure" placeholder="Ej. KG, PIEZA" required />
                            </div>
                        </div>
                        <div class="col">
                            <label for="price" class="form-label">Precio*</label>
                            <div class="input-group flex-nowrap">
                                <span class="input-group-text p-2">$</span>
                                <input type="number" class="form-control focus-ring" id="price" min="0" step="0.01" placeholder="0.00" required />
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <label for="image" class="form-label">Imagen</label>
                            <input class="focus-ring" type="file" id="image" accept="image/*" />
                            <div id="imagePreviewContainer" class="d-none mt-4 text-center">
                                <img id="imagePreview" class="img-fluid rounded product-image-preview" src="" alt="Vista previa de imagen" />
                            </div>
                        </div>
                    </div>
                    <div class="row m-0">
                        <div class="col">
                            <button class="btn secondary w-100" id="cancel" type="button" data-bs-dismiss="offcanvas">Cancelar</button>
                        </div>
                        <div class="col">
                            <button class="btn primary w-100" id="save" type="submit">Guardar servicio</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    </body>
</html>
