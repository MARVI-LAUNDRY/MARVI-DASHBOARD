<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>Compras</title>
        <!-- Estilos de bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
        <!-- Iconos de bootstrap -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <!-- Estilo propio -->
        <link rel="stylesheet" href="../css/tables.css" />
    </head>

    <body>
        <div class="header">
            <p>Lista de compras</p>
            <div class="d-flex gap-3">
                <button class="btn delete d-none" id="delete" title="Eliminar"><i class="bi bi-trash3"></i> Eliminar</button>
                <button class="btn filter" id="filter" data-bs-toggle="dropdown" title="Filtros de la tabla"><i class="bi bi-filter"></i> Filtros</button>
                <ul class="dropdown-menu">
                    <li>
                        <button class="dropdown-item" data-filter="codigo"><i class="bi bi-filter-left"></i> Código</button>
                    </li>
                    <li>
                        <button class="dropdown-item" data-filter="proveedor_id"><i class="bi bi-filter-left"></i> Proveedor</button>
                    </li>
                    <li>
                        <button class="dropdown-item" data-filter="total"><i class="bi bi-filter-left"></i> Total</button>
                    </li>
                    <li>
                        <button class="dropdown-item" data-filter="createdAt"><i class="bi bi-filter-left"></i> Fecha</button>
                    </li>
                </ul>

                <button class="btn filter" id="order" title="Ordenar tabla"><i class="bi bi-arrow-down-up"></i> Orden</button>
                <button class="btn new" id="newPurchaseBtn" title="Nuevo registro" data-bs-toggle="offcanvas" href="#offcanvasNewPurchase" role="button" aria-controls="offcanvasNewPurchase"><i class="bi bi-plus-lg"></i> Nueva compra</button>
            </div>
        </div>

        <div class="table-container position-relative" id="tableContainer">
            <div class="table-expand">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th scope="col" class="text-center"><i class="bi bi-check-square-fill"></i></th>
                            <th scope="col">Código</th>
                            <th scope="col">Proveedor</th>
                            <th scope="col">Productos</th>
                            <th scope="col">Total</th>
                            <th scope="col">Registrado</th>
                            <th scope="col" class="text-center"><i class="bi bi-caret-down-fill"></i></th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div class="table-footer">
                <p><span id="rowSelectNum">0</span> de <span id="rowsNum">0</span> filas seleccionadas</p>
                <div class="d-flex gap-3 align-items-center">
                    <p>Pagina <span id="currentPageNum">1</span> de <span id="totalPagesNum">1</span></p>
                    <button class="btn filter" id="start" disabled><i class="bi bi-chevron-double-left"></i></button>
                    <button class="btn filter" id="prev" disabled><i class="bi bi-chevron-left"></i></button>
                    <button class="btn filter" id="next" disabled><i class="bi bi-chevron-right"></i></button>
                    <button class="btn filter" id="end" disabled><i class="bi bi-chevron-double-right"></i></button>
                </div>
            </div>
        </div>

        <div class="offcanvas form-ext offcanvas-end" data-bs-backdrop="static" tabindex="-1" id="offcanvasNewPurchase" aria-labelledby="offcanvasNewPurchaseLabel">
            <div class="offcanvas-header d-flex justify-content-between">
                <button type="button" class="btn close" id="close" data-bs-dismiss="offcanvas" aria-label="close"><i class="bi bi-x-lg"></i></button>
                <p class="offcanvas-title" id="offcanvasNewPurchaseLabel">Compras</p>
                <button type="button" class="btn edit" id="edit" title="Editar compra" disabled><i class="bi bi-pencil-square"></i></button>
            </div>
            <div class="offcanvas-body">
                <p class="text-center">En esta sección vamos a crear y actualizar las compras. Completa los campos solicitados*.</p>
                <form id="formNewPurchase">
                    <div class="row">
                        <div class="col">
                            <label for="code" class="form-label">Código*</label>
                            <div class="input-group flex-nowrap">
                                <input type="text" class="form-control focus-ring" id="code" placeholder="Código de la compra" readonly required />
                            </div>
                        </div>
                        <div class="col">
                            <label for="supplier" class="form-label">Proveedor*</label>
                            <select class="form-select focus-ring" id="supplier" required></select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col">
                            <div class="d-flex justify-content-between align-items-center">
                                <label class="form-label m-0">Productos*</label>
                                <button class="btn filter" id="addProductLine" type="button"><i class="bi bi-plus-lg"></i> Agregar producto</button>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-sm">
                                    <thead>
                                        <tr>
                                            <th>Producto</th>
                                            <th>Cantidad</th>
                                            <th>Precio</th>
                                            <th>Subtotal</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody id="productsRows"></tbody>
                                </table>
                            </div>
                            <p class="text-end m-0">Total: $<span id="purchaseTotal">0.00</span></p>
                        </div>
                    </div>

                    <div class="row m-0">
                        <div class="col">
                            <button class="btn secondary w-100" id="cancel" type="button" data-bs-dismiss="offcanvas">Cancelar</button>
                        </div>
                        <div class="col">
                            <button class="btn primary w-100" id="save" type="submit">Guardar compra</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    </body>
</html>
